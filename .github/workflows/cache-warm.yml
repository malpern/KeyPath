name: Warm Build Cache

on:
  push:
    branches: [master]
    paths:
      - 'Sources/**'
      - 'Package.swift'
      - 'Package.resolved'

jobs:
  warm-cache:
    runs-on: [self-hosted, macOS, keypath]
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Add Homebrew and Cargo to PATH
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Swift (warms .build cache for PR jobs)
        run: swift build

      - name: Build kanata fork (warms cargo cache)
        run: |
          cd External/kanata
          cargo build --release --target aarch64-apple-darwin 2>&1 | tail -3
