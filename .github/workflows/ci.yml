name: KeyPath CI

on:
  push:
    branches: [ main, master, split-arch, another-light-refactor ]
  pull_request:
    branches: [ main, master, split-arch ]

jobs:
  build-and-test:
    runs-on: macos-latest
    timeout-minutes: 15
    env:
      COVERAGE_BASELINE_PERCENT: "0.27"
      COVERAGE_TOLERANCE_PERCENT: "0.01"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify Help Docs Parity
      run: |
        chmod +x ./Scripts/check-help-parity.sh
        ./Scripts/check-help-parity.sh

    - name: Cache Swift packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.swiftpm
        key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-swift-

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          .build
        key: ${{ runner.os }}-build-${{ hashFiles('Package.swift', 'Package.resolved') }}-${{ hashFiles('Sources/**/*.swift', 'Tests/**/*.swift') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ hashFiles('Package.swift', 'Package.resolved') }}-
          ${{ runner.os }}-build-

    - name: Cache Homebrew packages
      id: cache-brew
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/Homebrew
          /usr/local/Cellar/kanata
          /opt/homebrew/Cellar/kanata
        key: ${{ runner.os }}-brew-kanata-v1

    - name: Install Kanata
      run: |
        if ! command -v kanata &> /dev/null; then
          echo "Installing Kanata..."
          brew install kanata
        fi
        echo "Kanata: $(kanata --version)"

    - name: Lint WizardAutoFixer for forbidden subprocess usage
      run: |
        chmod +x ./Scripts/lint-no-subprocess-in-autofixer.sh
        ./Scripts/lint-no-subprocess-in-autofixer.sh

    - name: Build and Run All Tests
      run: |
        echo "Building and running full test suite..."
        export CI_ENVIRONMENT=true
        export SKIP_EVENT_TAP_TESTS=1
        export TIMEOUT_SECONDS=180
        chmod +x ./Scripts/run-tests-safe.sh
        ./Scripts/run-tests-safe.sh
        echo "TEST_STATUS=passed" >> $GITHUB_ENV

    - name: Parse Installer Reliability Matrix from Test Log
      if: always()
      run: |
        echo "Parsing installer reliability matrix from test output..."
        chmod +x ./Scripts/parse-installer-matrix.sh
        ./Scripts/parse-installer-matrix.sh test_output.safe.txt

    - name: Verify SMAppService plist wrapper
      run: |
        echo "Verifying com.keypath.kanata.plist points at kanata-launcher"
        ./Scripts/verify-kanata-plist.sh Sources/KeyPathApp/com.keypath.kanata.plist

    - name: Generate Coverage (single pass)
      run: |
        echo "Generating coverage with combined filter..."
        swift test --enable-code-coverage --filter 'KeyPathErrorTests|PermissionOracleTests'
        chmod +x ./Scripts/generate-coverage.sh
        ./Scripts/generate-coverage.sh coverage

    - name: Enforce Coverage Non-Regression (Narrow Lane)
      run: |
        echo "Enforcing narrow-lane coverage floor (${COVERAGE_BASELINE_PERCENT}%)..."
        if [ ! -f "coverage/coverage-summary.txt" ]; then
          echo "Missing coverage/coverage-summary.txt"
          exit 1
        fi

        ACTUAL_COVERAGE=$(awk '/^TOTAL/ {for(i=1;i<=NF;i++) if ($i ~ /%$/) {gsub("%","",$i); print $i; exit}}' coverage/coverage-summary.txt)
        if [ -z "${ACTUAL_COVERAGE}" ]; then
          echo "Could not parse TOTAL coverage from coverage/coverage-summary.txt"
          cat coverage/coverage-summary.txt
          exit 1
        fi

        echo "Coverage (narrow lane): ${ACTUAL_COVERAGE}%"
        EFFECTIVE_FLOOR=$(awk -v baseline="${COVERAGE_BASELINE_PERCENT}" -v tol="${COVERAGE_TOLERANCE_PERCENT}" 'BEGIN {printf "%.2f", baseline - tol}')
        if awk -v actual="${ACTUAL_COVERAGE}" -v floor="${EFFECTIVE_FLOOR}" 'BEGIN {exit !(actual + 0 >= floor + 0)}'; then
          echo "Coverage is non-regressing (>= ${EFFECTIVE_FLOOR}% effective floor)"
        else
          echo "Coverage regression: ${ACTUAL_COVERAGE}% < ${EFFECTIVE_FLOOR}% effective floor"
          exit 1
        fi

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test_output.safe.txt
          coverage/
          test-results/installer-reliability/
        if-no-files-found: ignore
        retention-days: 7

    - name: Generate Test Summary
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY

        if [ "${TEST_STATUS:-unknown}" = "failed" ]; then
          echo "**Tests Failed** - Check the test-results artifact for details." >> $GITHUB_STEP_SUMMARY
        elif [ "${TEST_STATUS:-unknown}" = "passed" ]; then
          echo "**All Tests Passed**" >> $GITHUB_STEP_SUMMARY
        else
          echo "**Test Status Unknown** (${TEST_STATUS:-unknown})" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Installer Reliability Matrix" >> $GITHUB_STEP_SUMMARY
        if [ -f "test-results/installer-reliability/latest/matrix-summary.md" ]; then
          cat test-results/installer-reliability/latest/matrix-summary.md >> $GITHUB_STEP_SUMMARY
        else
          echo "- Installer matrix summary not found." >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
        if [ -f "coverage/coverage-summary.txt" ]; then
          echo "- Baseline: \`$(cat coverage/coverage-summary.txt)\`" >> $GITHUB_STEP_SUMMARY
          echo "- Enforced narrow-lane floor: \`${COVERAGE_BASELINE_PERCENT}%\`" >> $GITHUB_STEP_SUMMARY
        else
          echo "- Coverage not generated in this run." >> $GITHUB_STEP_SUMMARY
        fi

  code-quality:
    runs-on: macos-latest
    timeout-minutes: 8

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Tools (optional)
      run: |
        # Install SwiftLint for linting
        if ! command -v swiftlint &> /dev/null; then
          echo "Installing SwiftLint..."
          brew install swiftlint
        fi

        # Install SwiftFormat for formatting checks
        if ! command -v swiftformat &> /dev/null; then
          echo "Installing SwiftFormat..."
          brew install swiftformat
        fi

    - name: SwiftLint Analysis
      run: |
        echo "Running comprehensive SwiftLint analysis..."

        # Full SwiftLint check (moved from pre-commit)
        if swiftlint --reporter github-actions-logging; then
          echo "No SwiftLint violations found"
          SWIFTLINT_STATUS="passed"
        else
          echo "SwiftLint found issues (details above)"
          SWIFTLINT_STATUS="issues_found"
          # Don't fail CI, just report
        fi

        echo "SWIFTLINT_STATUS=$SWIFTLINT_STATUS" >> $GITHUB_ENV

    - name: SwiftFormat Check
      run: |
        echo "Checking Swift formatting..."
        swiftformat --lint Sources/ Tests/ || {
          echo "SwiftFormat found formatting issues, but not failing CI"
          echo "Run 'swiftformat Sources/ Tests/' locally to fix formatting"
          exit 0
        }

    - name: Wizard Sleep Lint
      run: |
        chmod +x ./Scripts/lint-no-sleep.sh
        ./Scripts/lint-no-sleep.sh

    - name: Accessibility Check
      run: |
        python3 Scripts/check-accessibility.py || {
          echo "Some UI elements are missing accessibility identifiers"
          exit 0
        }

    - name: Screenshot Manifest Validation
      run: |
        chmod +x ./Scripts/validate-screenshot-manifest.sh
        ./Scripts/validate-screenshot-manifest.sh

    - name: Critical Pattern Analysis
      run: |
        if grep -r 'TODO.*CRITICAL\|FIXME.*URGENT' Sources/ --include='*.swift'; then
          echo "CRITICAL issues found that should block deployment"
          echo "CRITICAL_ISSUES=found" >> $GITHUB_ENV
        else
          echo "No critical TODOs/FIXMEs found"
          echo "CRITICAL_ISSUES=none" >> $GITHUB_ENV
        fi

    - name: Code Smell Detection
      run: |
        FORCE_UNWRAPS=0
        PRINT_STATEMENTS=0

        if grep -r "!" Sources/KeyPath/Managers/ --include="*.swift" | grep -v "!=" | grep -v "// swiftlint:disable" >/dev/null 2>&1; then
          echo "Force unwraps found in manager files:"
          grep -r "!" Sources/KeyPath/Managers/ --include="*.swift" | grep -v "!=" | grep -v "// swiftlint:disable" | head -10
          FORCE_UNWRAPS=1
        fi

        if grep -r "print(" Sources/ --include="*.swift" | grep -v "// debug" >/dev/null 2>&1; then
          echo "print() statements found (consider using Logger):"
          grep -r "print(" Sources/ --include="*.swift" | grep -v "// debug" | head -10
          PRINT_STATEMENTS=1
        fi

        echo "FORCE_UNWRAPS=$FORCE_UNWRAPS" >> $GITHUB_ENV
        echo "PRINT_STATEMENTS=$PRINT_STATEMENTS" >> $GITHUB_ENV

    - name: Generate Code Quality Summary
      if: always()
      run: |
        echo "## Code Quality Analysis" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${SWIFTLINT_STATUS:-unknown}" = "passed" ]; then
          echo "- SwiftLint: **No violations**" >> $GITHUB_STEP_SUMMARY
        elif [ "${SWIFTLINT_STATUS:-unknown}" = "issues_found" ]; then
          echo "- SwiftLint: **Issues detected** - See job logs" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${CRITICAL_ISSUES:-unknown}" = "found" ]; then
          echo "- **CRITICAL issues found** - Review urgently" >> $GITHUB_STEP_SUMMARY
        fi

        SMELLS_FOUND=0
        if [ "${FORCE_UNWRAPS:-0}" = "1" ]; then
          echo "- Force unwraps found in manager files" >> $GITHUB_STEP_SUMMARY
          SMELLS_FOUND=1
        fi
        if [ "${PRINT_STATEMENTS:-0}" = "1" ]; then
          echo "- print() statements found (consider using Logger)" >> $GITHUB_STEP_SUMMARY
          SMELLS_FOUND=1
        fi
        if [ "$SMELLS_FOUND" = "0" ] && [ "${CRITICAL_ISSUES:-unknown}" = "none" ]; then
          echo "- No code smells detected" >> $GITHUB_STEP_SUMMARY
        fi
