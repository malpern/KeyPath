# Sync the in-app help docs (`Sources/KeyPathAppKit/Resources/*.md` and
# the header / inline images they reference) into the Jekyll site that
# lives on the `gh-pages` branch. Runs on every push to `master` that
# touches a relevant file.
#
# The companion script is `Scripts/sync-docs-to-pages.py`. See that
# file's header for the transformation rules and operating
# principles. The workflow itself is just plumbing: check out master,
# check out a worktree of `gh-pages`, run the script, commit + push if
# anything changed.

name: Sync help docs to gh-pages

on:
  push:
    branches: [master]
    paths:
      - "Sources/KeyPathAppKit/Resources/*.md"
      - "Sources/KeyPathAppKit/Resources/header-*.png"
      - "Sources/KeyPathAppKit/Resources/_jekyll_meta.yml"
      - "Scripts/sync-docs-to-pages.py"
      - ".github/workflows/sync-docs-to-pages.yml"
  workflow_dispatch:  # allow manual re-runs from the Actions tab

concurrency:
  # Only one sync runs at a time. New pushes cancel an in-flight one.
  group: sync-docs-to-pages
  cancel-in-progress: true

permissions:
  contents: write  # needed to push to gh-pages

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          # Need the full history so we can also fetch gh-pages below.
          fetch-depth: 0

      - name: Fetch gh-pages branch
        run: git fetch origin gh-pages

      - name: Add gh-pages worktree
        run: git worktree add ../gh-pages-worktree gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync
        id: sync
        run: |
          python3 Scripts/sync-docs-to-pages.py \
            --source-dir Sources/KeyPathAppKit/Resources \
            --gh-pages-worktree ../gh-pages-worktree

      - name: Commit + push if dirty
        working-directory: ../gh-pages-worktree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No doc changes to sync."
            exit 0
          fi

          git add -A

          # Build a commit message that names the affected guides for
          # easy auditing in `gh-pages`'s log.
          changed=$(git diff --cached --name-only \
            | grep -E "^(guides/|images/help/)" \
            | sort -u)

          {
            echo "docs: sync help articles from master"
            echo
            echo "Auto-generated by .github/workflows/sync-docs-to-pages.yml"
            echo "from \`Sources/KeyPathAppKit/Resources/\` on master."
            echo
            echo "Files changed:"
            echo "$changed" | sed "s/^/- /"
          } > /tmp/sync-commit-msg.txt

          git commit -F /tmp/sync-commit-msg.txt
          git push origin gh-pages
