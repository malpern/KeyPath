name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect PR change scope
        id: changes
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed_files="$(git diff --name-only --diff-filter=d "origin/${{ github.base_ref }}" HEAD)"

          if printf '%s\n' "$changed_files" | grep -qx '.github/workflows/claude-code-review.yml'; then
            echo "workflow_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflow_changed=false" >> "$GITHUB_OUTPUT"
          fi

          non_docs_files="$(printf '%s\n' "$changed_files" | awk '
            NF == 0 { next }
            /^docs\// { next }
            /^[^\/]+\.md$/ { next }
            /^\.github\/workflows\/claude\.yml$/ { next }
            /^\.github\/workflows\/claude-code-review\.yml$/ { next }
            /^Sources\/KeyPathAppKit\/Resources\/[^\/]+\.(md|css|png)$/ { next }
            { print }
          ')"

          if [ -z "$non_docs_files" ]; then
            echo "docs_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code Review
        id: claude-review
        if: steps.changes.outputs.workflow_changed != 'true' && steps.changes.outputs.docs_only != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'cursor'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review only the changed diff in this pull request. Keep the review bounded:
            do not search issues, list other PRs, or inspect unrelated repository history.

            Focus on actionable correctness, reliability, security, performance, and
            test-coverage findings. Use the repository's CLAUDE.md for style and
            conventions when it is directly relevant to the diff.

            Use `gh pr comment` with your Bash tool to leave one concise review comment
            on the PR. If there are no actionable findings, say so briefly.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--max-turns 4 --allowed-tools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'

      - name: Skip Claude review for workflow-file changes
        if: steps.changes.outputs.workflow_changed == 'true'
        run: |
          echo "Skipping Claude review because .github/workflows/claude-code-review.yml changed in this PR."

      - name: Skip Claude review for docs-only changes
        if: steps.changes.outputs.workflow_changed != 'true' && steps.changes.outputs.docs_only == 'true'
        run: |
          echo "Skipping Claude review because this PR only changes docs or docs-adjacent assets."
