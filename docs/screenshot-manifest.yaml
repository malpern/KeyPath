# Screenshot & Image Manifest for KeyPath Help Documentation
#
# Generated from <!-- screenshot: --> tags embedded in markdown files.
# Source of truth: the HTML comments in Sources/KeyPathAppKit/Resources/*.md
#
# To regenerate this manifest:
#   grep -r '<!-- screenshot:' Sources/KeyPathAppKit/Resources/*.md | \
#     sed 's/.*<!-- screenshot: //' | sed 's/ -->//'
#
# Methods:
#   snapshot  — SwiftUI snapshot test (swift-snapshot-testing). Renders the
#               named view with the given state and captures a PNG.
#   peekaboo  — Peekaboo UI automation. Launches System Settings (or other
#               app), navigates to the specified pane, and captures a screenshot.
#   manual    — Requires human capture. macOS system dialogs that can't be
#               automated (authorization prompts, etc.).
#
# Last updated: 2026-02-19

